import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file("key.properties")
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withInputStream { keyProperties.load(it) }
}

def releaseStoreFile = keyProperties.getProperty("storeFile") ?: System.getenv("ANDROID_KEYSTORE_PATH")
def releaseStorePassword = keyProperties.getProperty("storePassword") ?: System.getenv("ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = keyProperties.getProperty("keyAlias") ?: System.getenv("ANDROID_KEY_ALIAS")
def releaseKeyPassword = keyProperties.getProperty("keyPassword") ?: System.getenv("ANDROID_KEY_PASSWORD")

android {
    namespace "com.trungtv.play.game_2048"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId "com.trungtv.play.game_2048"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            if (releaseStoreFile != null) {
                storeFile file(releaseStoreFile)
            }
            storePassword releaseStorePassword
            keyAlias releaseKeyAlias
            keyPassword releaseKeyPassword
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}
